services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: insurance
      POSTGRES_PASSWORD: insurance
      POSTGRES_DB: insurance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance -d insurance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
